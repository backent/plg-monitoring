server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: tmn-backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["backend"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id
    pipeline_stages:
      # Parse JSON fields from the structured log output
      - json:
          expressions:
            level: level
            message: message
            service: service
            environment: environment
            method: method
            path: path
            status_code: status_code
            duration_ms: duration_ms
            log_time: time

      # Promote key fields as indexed Loki labels (keep minimal for performance)
      - labels:
          level:
          service:
          environment:

      # Parse the timestamp from the application log
      - timestamp:
          source: log_time
          format: "2006-01-02T15:04:05Z07:00"
          action_on_failure: skip
